{% extends "base.html" %}
{% block title %}Inscription - Dashboard Securise{% endblock %}

{% block auth_content %}
<div class="w-full max-w-sm">
    <div class="text-center mb-8">
        <span class="text-5xl block mb-4">🛡️</span>
        <h1 class="text-2xl font-bold text-blue-400">Creer un compte</h1>
        <p class="text-slate-400 text-sm mt-2">Rejoignez le Dashboard Securise</p>
    </div>

    <form method="POST" class="bg-dark-800 rounded-2xl p-6 border border-slate-700/50 shadow-xl space-y-4">
        <div>
            <label for="username" class="block text-sm font-medium text-slate-300 mb-1.5">Nom d'utilisateur</label>
            <input type="text" id="username" name="username" required minlength="3" autocomplete="username"
                   class="w-full px-4 py-2.5 bg-dark-900 border border-slate-700 rounded-xl text-slate-100 placeholder-slate-500 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all"
                   placeholder="MonPseudo">
        </div>

        <div>
            <label for="email" class="block text-sm font-medium text-slate-300 mb-1.5">Email</label>
            <input type="email" id="email" name="email" required autocomplete="email"
                   class="w-full px-4 py-2.5 bg-dark-900 border border-slate-700 rounded-xl text-slate-100 placeholder-slate-500 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all"
                   placeholder="votre@email.com">
        </div>

        <div>
            <label for="password" class="block text-sm font-medium text-slate-300 mb-1.5">Mot de passe</label>
            <input type="password" id="password" name="password" required minlength="6" autocomplete="new-password"
                   class="w-full px-4 py-2.5 bg-dark-900 border border-slate-700 rounded-xl text-slate-100 placeholder-slate-500 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all"
                   placeholder="Minimum 6 caracteres">
        </div>

        <div>
            <label for="password2" class="block text-sm font-medium text-slate-300 mb-1.5">Confirmer le mot de passe</label>
            <input type="password" id="password2" name="password2" required minlength="6" autocomplete="new-password"
                   class="w-full px-4 py-2.5 bg-dark-900 border border-slate-700 rounded-xl text-slate-100 placeholder-slate-500 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all"
                   placeholder="Retapez le mot de passe">
        </div>

        <button type="submit"
                class="w-full py-2.5 bg-blue-600 hover:bg-blue-500 text-white font-medium rounded-xl transition-all duration-200 active:scale-[0.98]">
            Creer mon compte
        </button>
    </form>

    <p class="text-center text-sm text-slate-400 mt-6">
        Deja un compte ?
        <a href="{{ url_for('auth.login') }}" class="text-blue-400 hover:text-blue-300 font-medium transition-colors">
            Se connecter
        </a>
    </p>
</div>
{% endblock %}

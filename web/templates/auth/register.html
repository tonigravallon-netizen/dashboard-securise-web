{% extends "base_wiki.html" %}
{% block title %}Inscription{% endblock %}

{% block content %}
<div class="flex items-center justify-center min-h-[70vh]">
    <div class="w-full max-w-sm">
        <div class="text-center mb-8">
            <span class="text-5xl">👁️</span>
            <h1 class="font-title text-gold-500 text-2xl font-bold mt-3 tracking-wide">REJOINDRE ARCANA</h1>
            <p class="text-gray-500 text-sm mt-1">Creez votre identite d'investigateur</p>
        </div>

        <form method="POST" class="bg-abyss-800 rounded-xl border border-gold-500/10 p-6 space-y-4">
            <div>
                <label class="block text-xs text-gray-400 mb-1.5 font-mono uppercase tracking-wider">Nom d'agent</label>
                <input type="text" name="username" required minlength="3" autocomplete="username" placeholder="investigateur42"
                       class="w-full bg-abyss-700 border border-gold-500/15 rounded-lg px-4 py-2.5 text-sm text-parchment-100
                              placeholder-gray-600 focus:border-gold-500/40 focus:outline-none transition-all">
            </div>
            <div>
                <label class="block text-xs text-gray-400 mb-1.5 font-mono uppercase tracking-wider">Email</label>
                <input type="email" name="email" required autocomplete="email" placeholder="agent@arcana.wiki"
                       class="w-full bg-abyss-700 border border-gold-500/15 rounded-lg px-4 py-2.5 text-sm text-parchment-100
                              placeholder-gray-600 focus:border-gold-500/40 focus:outline-none transition-all">
            </div>
            <div>
                <label class="block text-xs text-gray-400 mb-1.5 font-mono uppercase tracking-wider">Mot de passe</label>
                <input type="password" name="password" required minlength="6" autocomplete="new-password" placeholder="Minimum 6 caracteres"
                       class="w-full bg-abyss-700 border border-gold-500/15 rounded-lg px-4 py-2.5 text-sm text-parchment-100
                              placeholder-gray-600 focus:border-gold-500/40 focus:outline-none transition-all">
            </div>
            <div>
                <label class="block text-xs text-gray-400 mb-1.5 font-mono uppercase tracking-wider">Confirmer</label>
                <input type="password" name="password2" required minlength="6" autocomplete="new-password" placeholder="Retapez le mot de passe"
                       class="w-full bg-abyss-700 border border-gold-500/15 rounded-lg px-4 py-2.5 text-sm text-parchment-100
                              placeholder-gray-600 focus:border-gold-500/40 focus:outline-none transition-all">
            </div>
            <button type="submit"
                    class="w-full bg-gold-500/15 hover:bg-gold-500/25 text-gold-500 font-title font-semibold py-2.5 rounded-lg
                           border border-gold-500/20 hover:border-gold-500/40 transition-all tracking-wide">
                Obtenir l'acces
            </button>
        </form>

        <p class="text-center text-sm text-gray-500 mt-4">
            Deja enregistre ?
            <a href="{{ url_for('auth.login') }}" class="text-gold-500 hover:text-gold-400 transition-colors">Se connecter</a>
        </p>
    </div>
</div>
{% endblock %}

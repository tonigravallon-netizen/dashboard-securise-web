<!-- Chatbot ORACLE - Widget flottant -->

<!-- Toggle button -->
<button id="chatbot-toggle" onclick="toggleChatbot()"
        class="chatbot-toggle fixed bottom-20 md:bottom-6 right-4 z-50 w-14 h-14 bg-abyss-700 border-2 border-gold-500/30
               rounded-full flex items-center justify-center hover:border-gold-500/50 hover:scale-105 transition-all cursor-pointer"
        title="Parler a ORACLE">
    <span class="text-2xl" id="chatbot-icon">👁️</span>
</button>

<!-- Chat panel -->
<div id="chatbot-panel" class="hidden chatbot-panel fixed bottom-36 md:bottom-24 right-4 z-50
     w-[340px] sm:w-[380px] h-[480px] bg-abyss-800 border border-gold-500/15 rounded-2xl shadow-2xl
     flex flex-col overflow-hidden">

    <!-- Header -->
    <div class="flex items-center justify-between px-4 py-3 bg-abyss-700 border-b border-gold-500/10">
        <div class="flex items-center gap-2">
            <span class="text-lg">👁️</span>
            <div>
                <div class="font-title text-gold-500 text-sm font-semibold">ORACLE</div>
                <div class="flex items-center gap-1">
                    <span class="w-1.5 h-1.5 bg-matrix-500 rounded-full"></span>
                    <span class="text-[10px] text-matrix-500 font-mono">EN LIGNE</span>
                </div>
            </div>
        </div>
        <div class="flex items-center gap-2">
            <button onclick="clearChatHistory()" class="text-gray-500 hover:text-red-400 transition-colors" title="Effacer l'historique">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
            </button>
            <button onclick="toggleChatbot()" class="text-gray-500 hover:text-parchment-100 transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
            </button>
        </div>
    </div>

    <!-- Messages -->
    <div id="chatbot-messages" class="flex-1 overflow-y-auto p-4 space-y-3">
        <!-- Welcome message -->
        <div class="flex gap-2">
            <span class="text-lg flex-shrink-0 mt-1">👁️</span>
            <div class="chat-bubble-ai px-3 py-2 text-sm text-parchment-200">
                🔍 Bienvenue dans les <strong class="text-gold-500">Archives Interdites</strong>. Je suis <strong class="text-gold-400">ORACLE</strong>, votre guide dans les mysteres et les verites cachees. Quel sujet souhaitez-vous explorer ?
            </div>
        </div>
    </div>

    <!-- Input -->
    <div class="px-3 py-3 bg-abyss-700/50 border-t border-gold-500/10">
        <form onsubmit="sendChatMessage(event)" class="flex gap-2">
            <input type="text" id="chatbot-input" placeholder="Posez votre question..."
                   class="flex-1 bg-abyss-800 border border-gold-500/15 rounded-lg px-3 py-2 text-sm text-parchment-100
                          placeholder-gray-500 focus:border-gold-500/30 focus:outline-none transition-all"
                   autocomplete="off">
            <button type="submit" class="bg-gold-500/15 hover:bg-gold-500/25 text-gold-500 px-3 py-2 rounded-lg transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg>
            </button>
        </form>
    </div>
</div>
